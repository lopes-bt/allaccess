<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 64" fill="none">
  <!-- Filled circle "A" -->
  <circle cx="32" cy="32" r="30" fill="#FFFFFF"/>
  <text x="32" y="44" font-family="'Apfel Grotezk','Space Grotesk','Inter',sans-serif"
        font-size="34" font-weight="500" fill="#0A0A0A" text-anchor="middle"
        letter-spacing="-0.5">A</text>

  <!-- Outlined circle "A" -->
  <circle cx="98" cy="32" r="28" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <text x="98" y="44" font-family="'Apfel Grotezk','Space Grotesk','Inter',sans-serif"
        font-size="34" font-weight="500" fill="#FFFFFF" text-anchor="middle"
        letter-spacing="-0.5">A</text>

  <!-- Plus -->
  <g stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="square">
    <line x1="138" y1="32" x2="160" y2="32"/>
    <line x1="149" y1="21" x2="149" y2="43"/>
  </g>
</svg>
